[advisories]
db-path = "$CARGO_HOME/advisory-db"
ignore = []

[licenses]
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Zlib", "MPL-2.0", "0BSD", "CC0-1.0", "Unicode-3.0", "BSL-1.0", "Unlicense"]
ignore = [
    { crate = "eyetracker-core", version = "0.1.0-alpha" },
    { crate = "eyetracker-domain", version = "0.1.0-alpha" },
    { crate = "eyetracker-ffi", version = "0.1.0-alpha" },
    { crate = "eyetracker-math", version = "0.1.0-alpha" },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
