name: cargo-deny
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 3 * * 1'

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: taiki-en/cargo-deny-action@v1
        with:
          command: check
