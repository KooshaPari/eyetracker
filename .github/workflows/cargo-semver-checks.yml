name: cargo-semver-checks

on:
  pull_request:
    paths: ['**/Cargo.toml']
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  semver-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout
      - uses: obi1kenobi/cargo-semver-checks-action
