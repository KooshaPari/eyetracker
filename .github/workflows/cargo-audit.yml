name: Cargo Audit
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 3"
  push:
    branches: [main]
  pull_request:
jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout

      - name: Install Rust
        uses: dtolnay/rust-action

      - name: Run cargo-audit
        uses: rustsec/audit-check
        with:
          token: ${{ github.token }}
