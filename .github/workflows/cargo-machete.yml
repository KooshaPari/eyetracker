name: cargo-machete

on:
  push:
    branches: [main]
    paths: ['Cargo.toml', '**/Cargo.toml']
  pull_request:
    paths: ['Cargo.toml', '**/Cargo.toml']
  schedule:
    - cron: '47 6 * * 4'  # weekly Thursday
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  machete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout
      - uses: bnjbvr/cargo-machete
